name: Docker publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: landscrape-web
            dockerfile: infra/docker/web.Dockerfile
            context: .
          - image: landscrape-admin
            dockerfile: infra/docker/admin.Dockerfile
            context: .
          - image: landscrape-api
            dockerfile: infra/docker/api.Dockerfile
            context: .
          - image: landscrape-agent
            dockerfile: infra/docker/agent.Dockerfile
            context: .
          - image: landscrape-worker
            dockerfile: infra/docker/worker.Dockerfile
            context: .
          - image: landscrape-mcp-sidecar
            dockerfile: infra/docker/mcp-sidecars.Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=prod
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
