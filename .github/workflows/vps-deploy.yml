name: VPS deploy

on:
  workflow_run:
    workflows: [Docker publish]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

env:
  VPS_HOST: ${{ vars.VPS_HOST }}
  VPS_USER: ${{ vars.VPS_USER }}
  VPS_REMOTE_DIR: ${{ vars.VPS_REMOTE_DIR }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure deploy target
        run: |
          VPS_HOST="${VPS_HOST:-72.61.5.60}"
          VPS_USER="${VPS_USER:-root}"
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"
          echo "VPS_USER=$VPS_USER" >> "$GITHUB_ENV"
          echo "VPS_REMOTE_DIR=${VPS_REMOTE_DIR:-/opt/landscrape}" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync repository to VPS
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=yes" --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude apps/web/.next \
            --exclude apps/admin/.next \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_REMOTE_DIR}/"

      - name: Pull images and restart stack
        run: |
          ssh -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "bash ${VPS_REMOTE_DIR}/infra/vps/remote-deploy.sh"

      - name: Smoke check (optional)
        continue-on-error: true
        run: |
          curl -sfI --max-time 30 https://deliver-impact.com | head -5
